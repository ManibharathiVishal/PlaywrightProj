name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Select project to run"
        required: true
        type: choice
        options:
          - BDDwithGitFlow
          - Orange
          - GuruAutom
          - PlayPrac
          - PlaywrightBDD
          - PlaywrightPrac
          - playwright-sdet-test-main
          - PomStyle
          - Practice
          - RegAutom

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ github.event.inputs.project }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Cucumber tests
        run: npx cucumber-js  

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: BDDwithGitFlow/playwright-report/
          retention-days: 30
